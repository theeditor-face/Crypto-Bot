<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Mr Crypto — Trading Terminal</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #050810;
  --surface:  #0a0f1e;
  --card:     #0d1526;
  --card2:    #111e35;
  --border:   #1a2d4a;
  --gold:     #c8a84b;
  --gold2:    #f0d060;
  --cyan:     #00d4ff;
  --cyan2:    #00ffea;
  --green:    #00e676;
  --red:      #ff3d5a;
  --text:     #e8f0f8;
  --muted:    #4a6a8a;
  --font:     'Orbitron', monospace;
  --body:     'Rajdhani', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── SCANLINE OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,212,255,0.015) 2px,
    rgba(0,212,255,0.015) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

/* ── GRID BG ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ══════════════════════════════════
   APP SHELL
══════════════════════════════════ */
#app {
  position: fixed; inset: 0;
  display: flex;
  flex-direction: column;
  z-index: 1;
}

/* ── TOP BAR ── */
.topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--border);
  background: rgba(5,8,16,0.95);
  backdrop-filter: blur(20px);
}

.logo {
  font-family: var(--font);
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--gold), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,230,118,0.1);
  border: 1px solid rgba(0,230,118,0.3);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  font-family: var(--font);
  color: var(--green);
  letter-spacing: 1px;
}

.live-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 1.5s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.7); }
}

/* ── PAGES ── */
.pages {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.page {
  position: absolute; inset: 0;
  overflow-y: auto;
  padding: 16px;
  opacity: 0;
  transform: translateY(16px);
  pointer-events: none;
  transition: opacity 0.35s ease, transform 0.35s ease;
  scrollbar-width: none;
}
.page::-webkit-scrollbar { display: none; }
.page.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

/* ── BOTTOM NAV ── */
.nav {
  flex-shrink: 0;
  display: flex;
  background: rgba(5,8,16,0.97);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(20px);
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 4px 12px;
  background: none;
  border: none;
  color: var(--muted);
  font-family: var(--body);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s;
  position: relative;
}

.nav-btn .nav-icon { font-size: 20px; line-height: 1; }

.nav-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--cyan));
  border-radius: 0 0 4px 4px;
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

.nav-btn.active {
  color: var(--cyan);
}
.nav-btn.active::before { transform: scaleX(1); }

/* ══════════════════════════════════
   CARDS & COMPONENTS
══════════════════════════════════ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.4;
}

.card-gold::before {
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.section-title {
  font-family: var(--font);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* ── PRICE TAG ── */
.price-big {
  font-family: var(--font);
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -1px;
}

.price-change {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
}

.price-change.up   { color: var(--green); background: rgba(0,230,118,0.12); }
.price-change.down { color: var(--red);   background: rgba(255,61,90,0.12); }

/* ── COIN ROW ── */
.coin-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 0;
  border-bottom: 1px solid rgba(26,45,74,0.5);
  cursor: pointer;
  transition: background 0.2s;
}
.coin-row:last-child { border-bottom: none; }
.coin-row:active { background: rgba(0,212,255,0.04); border-radius: 8px; }

.coin-icon {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700;
  flex-shrink: 0;
  border: 1px solid var(--border);
  font-family: var(--font);
}

.coin-info { flex: 1; min-width: 0; }
.coin-name  { font-weight: 700; font-size: 15px; color: var(--text); }
.coin-sym   { font-size: 12px; color: var(--muted); font-family: var(--font); letter-spacing: 1px; }

.coin-right { text-align: right; flex-shrink: 0; }
.coin-price { font-family: var(--font); font-size: 14px; font-weight: 600; }
.coin-pct   { font-size: 12px; font-weight: 700; margin-top: 2px; }
.coin-pct.up   { color: var(--green); }
.coin-pct.down { color: var(--red); }

/* ── SIGNAL BADGE ── */
.signal-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 6px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
}
.signal-badge.buy        { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
.signal-badge.strong-buy { background: rgba(0,230,118,0.25); color: var(--green); border: 1px solid var(--green); }
.signal-badge.sell       { background: rgba(255,61,90,0.15);  color: var(--red);   border: 1px solid rgba(255,61,90,0.3); }
.signal-badge.strong-sell{ background: rgba(255,61,90,0.25);  color: var(--red);   border: 1px solid var(--red); }
.signal-badge.hold       { background: rgba(200,168,75,0.15); color: var(--gold2); border: 1px solid rgba(200,168,75,0.3); }

/* ── RSI BAR ── */
.rsi-track {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin: 6px 0;
}
.rsi-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s ease;
}

/* ── STAT GRID ── */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-box {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
}
.stat-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.stat-value { font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--text); }

/* ── FEAR GAUGE ── */
.fear-gauge {
  position: relative;
  width: 180px;
  height: 90px;
  margin: 0 auto 16px;
}

.fear-gauge svg { width: 100%; height: 100%; overflow: visible; }

/* ── SPARKLINE ── */
.sparkline { width: 70px; height: 28px; }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--card2);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 14px;
}
.tab {
  flex: 1;
  padding: 7px;
  border: none;
  border-radius: 6px;
  background: none;
  color: var(--muted);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.tab.active {
  background: var(--card);
  color: var(--cyan);
  border: 1px solid var(--border);
}

/* ── LOADING ── */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 60px 0;
  color: var(--muted);
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: 2px;
}

.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TRENDING RANK ── */
.trend-rank {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.rank-1 { background: linear-gradient(135deg,#ffd700,#ff8c00); color:#000; }
.rank-2 { background: linear-gradient(135deg,#c0c0c0,#808080); color:#000; }
.rank-3 { background: linear-gradient(135deg,#cd7f32,#8b4513); color:#fff; }
.rank-n { background: var(--card2); color: var(--muted); border: 1px solid var(--border); }

/* ── INDICATOR ROW ── */
.indicator-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(26,45,74,0.4);
  font-size: 14px;
}
.indicator-row:last-child { border-bottom: none; }
.ind-label { color: var(--muted); font-size: 13px; }
.ind-value { font-family: var(--font); font-size: 13px; font-weight: 600; }

/* ── GLOW EFFECTS ── */
.glow-green { box-shadow: 0 0 20px rgba(0,230,118,0.15); }
.glow-red   { box-shadow: 0 0 20px rgba(255,61,90,0.15); }
.glow-gold  { box-shadow: 0 0 20px rgba(200,168,75,0.15); }

/* ── MARKET OVERVIEW HERO ── */
.market-hero {
  background: linear-gradient(135deg, #0a0f1e 0%, #0d1a30 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.market-hero::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
}

/* ── PORTFOLIO FAKE ── */
.portfolio-bar {
  height: 10px;
  border-radius: 5px;
  display: flex;
  overflow: hidden;
  gap: 2px;
  margin: 12px 0;
}

/* ── NEWS CARD ── */
.news-item {
  padding: 14px 0;
  border-bottom: 1px solid rgba(26,45,74,0.4);
  cursor: pointer;
}
.news-item:last-child { border-bottom: none; }
.news-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
.news-meta  { font-size: 12px; color: var(--muted); display: flex; gap: 10px; }
.news-tag   {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 10px;
  font-family: var(--font);
  letter-spacing: 1px;
  font-weight: 700;
}
.news-tag.bull { background: rgba(0,230,118,0.15); color: var(--green); }
.news-tag.bear { background: rgba(255,61,90,0.15);  color: var(--red); }
.news-tag.neut { background: rgba(0,212,255,0.15);  color: var(--cyan); }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
.fade-up { animation: fadeUp 0.4s ease forwards; }

@keyframes countUp {
  from { opacity:0; }
  to   { opacity:1; }
}

/* ── DETAIL PANEL ── */
.detail-panel {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 500;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto;
  padding: 0;
}
.detail-panel.open { transform: translateX(0); }
.detail-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(5,8,16,0.97);
  position: sticky; top: 0;
  z-index: 10;
  backdrop-filter: blur(20px);
}
.back-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--cyan);
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}
.detail-body { padding: 16px; }

/* ── CHART PLACEHOLDER ── */
.chart-area {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  height: 180px;
  display: flex;
  align-items: flex-end;
  padding: 12px 8px 8px;
  gap: 3px;
  overflow: hidden;
  position: relative;
  margin-bottom: 12px;
}
.chart-bar {
  flex: 1;
  border-radius: 2px 2px 0 0;
  transition: height 0.8s ease;
  min-height: 4px;
}

.chart-line-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>

<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">MR CRYPTO</div>
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
  </div>

  <!-- PAGES -->
  <div class="pages">

    <!-- ══════════════════════════════
         PAGE 1: DASHBOARD
    ══════════════════════════════ -->
    <div class="page active" id="page-dashboard">
      <div id="dashboard-content">
        <div class="loading"><div class="spinner"></div>LOADING MARKET DATA</div>
      </div>
    </div>

    <!-- ══════════════════════════════
         PAGE 2: SIGNALS
    ══════════════════════════════ -->
    <div class="page" id="page-signals">
      <div id="signals-content">
        <div class="loading"><div class="spinner"></div>COMPUTING SIGNALS</div>
      </div>
    </div>

    <!-- ══════════════════════════════
         PAGE 3: MARKETS
    ══════════════════════════════ -->
    <div class="page" id="page-markets">
      <div id="markets-content">
        <div class="loading"><div class="spinner"></div>FETCHING PRICES</div>
      </div>
    </div>

    <!-- ══════════════════════════════
         PAGE 4: TRENDING
    ══════════════════════════════ -->
    <div class="page" id="page-trending">
      <div id="trending-content">
        <div class="loading"><div class="spinner"></div>LOADING TRENDS</div>
      </div>
    </div>

    <!-- ══════════════════════════════
         PAGE 5: INTEL
    ══════════════════════════════ -->
    <div class="page" id="page-intel">
      <div id="intel-content">
        <div class="loading"><div class="spinner"></div>LOADING INTEL</div>
      </div>
    </div>

  </div><!-- /pages -->

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="nav-btn active" onclick="switchPage('dashboard',this)">
      <span class="nav-icon">📊</span>Dashboard
    </button>
    <button class="nav-btn" onclick="switchPage('signals',this)">
      <span class="nav-icon">🎯</span>Signals
    </button>
    <button class="nav-btn" onclick="switchPage('markets',this)">
      <span class="nav-icon">💹</span>Markets
    </button>
    <button class="nav-btn" onclick="switchPage('trending',this)">
      <span class="nav-icon">🔥</span>Trending
    </button>
    <button class="nav-btn" onclick="switchPage('intel',this)">
      <span class="nav-icon">🧠</span>Intel
    </button>
  </nav>

</div><!-- /app -->

<!-- COIN DETAIL PANEL -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">‹</button>
    <div id="detail-title" style="font-family:var(--font);font-size:14px;font-weight:700;"></div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════
//  TELEGRAM WEBAPP INIT
// ═══════════════════════════════════════════════
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#050810');
  tg.setBackgroundColor('#050810');
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let marketData   = null;
let globalData   = null;
let trendingData = null;
let fearData     = null;
let loadedPages  = new Set();
let currentPage  = 'dashboard';

const COINGECKO = 'https://api.coingecko.com/api/v3';

const COINS = [
  'bitcoin','ethereum','solana','binancecoin','ripple',
  'cardano','dogecoin','avalanche-2','chainlink','polkadot',
  'toncoin','shiba-inu','litecoin','uniswap','pepe'
];

const META = {
  'bitcoin':     {sym:'BTC',  icon:'₿',  bg:'#f7931a22', fg:'#f7931a'},
  'ethereum':    {sym:'ETH',  icon:'Ξ',  bg:'#627eea22', fg:'#627eea'},
  'solana':      {sym:'SOL',  icon:'◎',  bg:'#9945ff22', fg:'#9945ff'},
  'binancecoin': {sym:'BNB',  icon:'B',  bg:'#f3ba2f22', fg:'#f3ba2f'},
  'ripple':      {sym:'XRP',  icon:'✕',  bg:'#00aae422', fg:'#00aae4'},
  'cardano':     {sym:'ADA',  icon:'₳',  bg:'#0033ad22', fg:'#0033ad'},
  'dogecoin':    {sym:'DOGE', icon:'Ð',  bg:'#c2a63322', fg:'#c2a633'},
  'avalanche-2': {sym:'AVAX', icon:'A',  bg:'#e8413322', fg:'#e84133'},
  'chainlink':   {sym:'LINK', icon:'⬡',  bg:'#2a5ada22', fg:'#2a5ada'},
  'polkadot':    {sym:'DOT',  icon:'●',  bg:'#e6007a22', fg:'#e6007a'},
  'toncoin':     {sym:'TON',  icon:'💎', bg:'#0088cc22', fg:'#0088cc'},
  'shiba-inu':   {sym:'SHIB', icon:'🐕', bg:'#ff000022', fg:'#ff6600'},
  'litecoin':    {sym:'LTC',  icon:'Ł',  bg:'#bebebe22', fg:'#bebebe'},
  'uniswap':     {sym:'UNI',  icon:'🦄', bg:'#ff007a22', fg:'#ff007a'},
  'pepe':        {sym:'PEPE', icon:'🐸', bg:'#00800022', fg:'#00cc44'},
};

// ═══════════════════════════════════════════════
//  FETCH
// ═══════════════════════════════════════════════
async function fetchAll() {
  try {
    const ids = COINS.join(',');
    const [mkt, gbl, trnd, fg] = await Promise.all([
      fetch(`${COINGECKO}/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&per_page=50&page=1&sparkline=true&price_change_percentage=1h,24h,7d`).then(r=>r.json()),
      fetch(`${COINGECKO}/global`).then(r=>r.json()),
      fetch(`${COINGECKO}/search/trending`).then(r=>r.json()),
      fetch('https://api.alternative.me/fng/').then(r=>r.json()),
    ]);
    marketData   = mkt;
    globalData   = gbl.data;
    trendingData = trnd.coins?.slice(0,8) || [];
    fearData     = fg.data?.[0] || null;
  } catch(e) {
    console.error('Fetch error:', e);
  }
}

// ═══════════════════════════════════════════════
//  SIGNAL ENGINE
// ═══════════════════════════════════════════════
function computeRSI(prices, period=14) {
  if (!prices || prices.length < period+1) return null;
  let gains=[], losses=[];
  for (let i=1;i<prices.length;i++) {
    const d = prices[i]-prices[i-1];
    gains.push(Math.max(d,0));
    losses.push(Math.max(-d,0));
  }
  const ag = gains.slice(-period).reduce((a,b)=>a+b,0)/period;
  const al = losses.slice(-period).reduce((a,b)=>a+b,0)/period;
  if (al===0) return 100;
  return Math.round(100 - (100/(1+ag/al)));
}

function computeSMA(prices, period) {
  if (!prices || prices.length < period) return null;
  return prices.slice(-period).reduce((a,b)=>a+b,0)/period;
}

function getSignal(coin) {
  const spark = coin.sparkline_in_7d?.price || [];
  const rsi   = computeRSI(spark);
  const sma7  = computeSMA(spark, 49);
  const sma25 = computeSMA(spark, 168);
  const ch24  = coin.price_change_percentage_24h_in_currency || 0;
  const vol   = coin.total_volume || 0;
  const mcap  = coin.market_cap || 1;

  let score = 0;
  if (rsi) {
    if (rsi < 25)      score += 4;
    else if (rsi < 30) score += 3;
    else if (rsi > 80) score -= 4;
    else if (rsi > 70) score -= 3;
    else if (rsi < 45) score += 1;
    else if (rsi > 55) score -= 1;
  }
  if (sma7 && sma25) score += sma7 > sma25 ? 2 : -2;
  if (ch24 > 8)      score += 2;
  else if (ch24 > 4) score += 1;
  else if (ch24 < -8) score -= 2;
  else if (ch24 < -4) score -= 1;
  if (vol/mcap > 0.15) score += 1;

  let label, cls;
  if      (score >= 5)  { label='STRONG BUY';  cls='strong-buy'; }
  else if (score >= 2)  { label='BUY';          cls='buy'; }
  else if (score <= -5) { label='STRONG SELL';  cls='strong-sell'; }
  else if (score <= -2) { label='SELL';         cls='sell'; }
  else                  { label='HOLD';         cls='hold'; }

  return { score, label, cls, rsi, sma7, sma25 };
}

// ═══════════════════════════════════════════════
//  FORMATTERS
// ═══════════════════════════════════════════════
function fmtPrice(p) {
  if (!p) return '$0';
  if (p >= 1000) return '$'+p.toLocaleString('en',{maximumFractionDigits:2});
  if (p >= 1)    return '$'+p.toFixed(4);
  if (p >= 0.01) return '$'+p.toFixed(5);
  return '$'+p.toFixed(8);
}

function fmtBig(n) {
  if (n >= 1e12) return '$'+(n/1e12).toFixed(2)+'T';
  if (n >= 1e9)  return '$'+(n/1e9).toFixed(2)+'B';
  if (n >= 1e6)  return '$'+(n/1e6).toFixed(2)+'M';
  return '$'+n.toLocaleString();
}

function fmtPct(v) {
  const cls  = v >= 0 ? 'up' : 'down';
  const sign = v >= 0 ? '+' : '';
  return `<span class="coin-pct ${cls}">${sign}${v?.toFixed(2)}%</span>`;
}

function fmtChange(v) {
  if (!v) return '<span class="price-change hold">0.00%</span>';
  const cls  = v >= 0 ? 'up' : 'down';
  const sign = v >= 0 ? '+' : '';
  return `<span class="price-change ${cls}">${sign}${v.toFixed(2)}%</span>`;
}

function sparkSVG(prices, color) {
  if (!prices || prices.length < 2) return '';
  const w=70, h=28;
  const min=Math.min(...prices), max=Math.max(...prices);
  const range = max-min || 1;
  const pts = prices.map((p,i) => {
    const x = (i/(prices.length-1))*w;
    const y = h - ((p-min)/range)*h;
    return `${x},${y}`;
  }).join(' ');
  const area = `${pts} ${w},${h} 0,${h}`;
  return `<svg class="sparkline" viewBox="0 0 ${w} ${h}">
    <defs><linearGradient id="sg${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${area}" fill="url(#sg${color.replace('#','')})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function chartBarsSVG(prices) {
  if (!prices || prices.length < 2) return '';
  const slice = prices.slice(-30);
  const min=Math.min(...slice), max=Math.max(...slice);
  const range = max-min || 1;
  const bars = slice.map((p,i) => {
    const hPct = ((p-min)/range)*85+5;
    const color = p >= (slice[i-1]||p) ? '#00e676' : '#ff3d5a';
    return `<div class="chart-bar" style="height:${hPct}%;background:${color};opacity:0.7;"></div>`;
  }).join('');
  return bars;
}

function nowUTC() {
  return new Date().toLocaleString('en',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'UTC'}) + ' UTC';
}

      <div style="display:flex;align-items:center;gap:10px;margin-top:8px">

          <div style="height:100%;width:${healthScore}%;background:${healthColor};border-radius:4px;transition:width 1s ease"></div>
        </div>
        <span style="font-family:var(--font);font-size:14px;font-weight:700;color:${healthColor}">${healthScore}%</span>
      </div>
    </div>
  </div>

  <div class="card fade-up" style="animation-delay:0.2s">
    <div class="section-title">📖 HOW SIGNALS WORK</div>
    <div style="font-size:13px;color:var(--muted);line-height:1.7">
      Each coin is scored using multiple indicators:<br><br>
      <div class="indicator-row"><span class="ind-label">RSI &lt; 30</span><span class="ind-value" style="color:var(--green)">+3 (Oversold)</span></div>
      <div class="indicator-row"><span class="ind-label">RSI &gt; 70</span><span class="ind-value" style="color:var(--red)">-3 (Overbought)</span></div>
      <div class="indicator-row"><span class="ind-label">SMA Bullish Cross</span><span class="ind-value" style="color:var(--green)">+2</span></div>
      <div class="indicator-row"><span class="ind-label">SMA Bearish Cross</span><span class="ind-value" style="color:var(--red)">-2</span></div>
      <div class="indicator-row"><span class="ind-label">Score ≥ 5</span><span class="ind-value" style="color:var(--green)">STRONG BUY</span></div>
      <div class="indicator-row"><span class="ind-label">Score ≤ -5</span><span class="ind-value" style="color:var(--red)">STRONG SELL</span></div>
    </div>
  </div>

  <div style="text-align:center;padding:12px 0 4px">
    <div style="font-size:10px;color:var(--muted);font-family:var(--font);letter-spacing:1px">⚠ NOT FINANCIAL ADVICE · DYOR</div>
    <div style="font-size:10px;color:var(--muted);font-family:var(--font);margin-top:4px">${nowUTC()}</div>
  </div>`;
}

// ═══════════════════════════════════════════════
//  COIN DETAIL PANEL
// ═══════════════════════════════════════════════
function openDetail(coinId) {
  const coin = marketData?.find(c => c.id === coinId);
  if (!coin) return;
  const m   = META[coinId] || {sym:coin.symbol.toUpperCase(),icon:'●',fg:'#00d4ff',bg:'#1a2d4a22'};
  const sig = getSignal(coin);
  const ch1h  = coin.price_change_percentage_1h_in_currency || 0;
  const ch24h = coin.price_change_percentage_24h_in_currency || 0;
  const ch7d  = coin.price_change_percentage_7d_in_currency || 0;
  const spark = coin.sparkline_in_7d?.price || [];

  document.getElementById('detail-title').innerHTML =
    `<span style="color:${m.fg}">${m.icon}</span> ${coin.name} <span style="color:var(--muted);font-size:11px">(${m.sym})</span>`;

  document.getElementById('detail-body').innerHTML = `
  <div style="text-align:center;padding:20px 0 16px">
    <div class="price-big">${fmtPrice(coin.current_price)}</div>
    <div style="margin-top:8px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap">
      ${fmtChange(ch1h)} <span style="color:var(--muted);font-size:12px">1h</span>
      ${fmtChange(ch24h)} <span style="color:var(--muted);font-size:12px">24h</span>
      ${fmtChange(ch7d)} <span style="color:var(--muted);font-size:12px">7d</span>
    </div>
    <div style="margin-top:14px">
      <span class="signal-badge ${sig.cls}" style="font-size:13px;padding:8px 20px">${sig.label}</span>
    </div>
  </div>

  <div class="chart-area">
    ${chartBarsSVG(spark)}
  </div>

  <div class="stat-grid" style="margin-bottom:12px">
    <div class="stat-box">
      <div class="stat-label">Market Cap</div>
      <div class="stat-value">${fmtBig(coin.market_cap||0)}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">24h Volume</div>
      <div class="stat-value">${fmtBig(coin.total_volume||0)}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">24h High</div>
      <div class="stat-value" style="color:var(--green)">${fmtPrice(coin.high_24h||0)}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">24h Low</div>
      <div class="stat-value" style="color:var(--red)">${fmtPrice(coin.low_24h||0)}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">All Time High</div>
      <div class="stat-value">${fmtPrice(coin.ath||0)}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Rank</div>
      <div class="stat-value">#${coin.market_cap_rank||'?'}</div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">🔬 TECHNICAL ANALYSIS</div>
    <div class="indicator-row">
      <span class="ind-label">RSI (14)</span>
      <span class="ind-value" style="color:${sig.rsi < 30 ? 'var(--green)' : sig.rsi > 70 ? 'var(--red)' : 'var(--text)'}">${sig.rsi || '─'}</span>
    </div>
    ${sig.rsi ? `<div class="rsi-track"><div class="rsi-fill" style="width:${sig.rsi}%;background:${sig.rsi<30?'var(--green)':sig.rsi>70?'var(--red)':'var(--gold2)'}"></div></div>` : ''}
    <div class="indicator-row">
      <span class="ind-label">Signal Score</span>
      <span class="ind-value" style="color:${sig.score>0?'var(--green)':sig.score<0?'var(--red)':'var(--gold2)'}">${sig.score > 0 ? '+'+sig.score : sig.score}</span>
    </div>
    <div class="indicator-row">
      <span class="ind-label">SMA (7d)</span>
      <span class="ind-value">${sig.sma7 ? fmtPrice(sig.sma7) : '─'}</span>
    </div>
    <div class="indicator-row">
      <span class="ind-label">SMA (25d)</span>
      <span class="ind-value">${sig.sma25 ? fmtPrice(sig.sma25) : '─'}</span>
    </div>
    <div class="indicator-row">
      <span class="ind-label">Circulating Supply</span>
      <span class="ind-value" style="font-size:12px">${(coin.circulating_supply||0).toLocaleString('en',{maximumFractionDigits:0})} ${m.sym}</span>
    </div>
  </div>

  <div style="font-size:10px;color:var(--muted);text-align:center;padding:8px 0;font-family:var(--font);letter-spacing:1px">
    ⚠ NOT FINANCIAL ADVICE · DYOR<br>${nowUTC()}
  </div>`;

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  currentPage = name;
  if (!loadedPages.has(name)) {
    loadedPages.add(name);
    renderPage(name);
  }
}

function renderPage(name) {
  switch(name) {
    case 'dashboard': renderDashboard(); break;
    case 'signals':   renderSignals();   break;
    case 'markets':   renderMarkets();   break;
    case 'trending':  renderTrending();  break;
    case 'intel':     renderIntel();     break;
  }
}

function showTab(name, btn) {
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display='none');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+name).style.display='block';
  btn.classList.add('active');
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
async function init() {
  await fetchAll();
  loadedPages.add('dashboard');
  renderDashboard();

  // Auto-refresh every 60 seconds
  setInterval(async () => {
    await fetchAll();
    renderPage(currentPage);
  }, 60000);
}

init();
</script>
</body>
</html>
