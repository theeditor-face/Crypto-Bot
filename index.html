<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Mr Crypto</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#030608;--card:#0a1220;--card2:#0e1a2e;--border:#142035;--gold:#c8a84b;--gold2:#f0d060;--cyan:#00d4ff;--green:#00e676;--red:#ff3d5a;--text:#e8f4ff;--muted:#3a5570;--font:'Orbitron',monospace;--body:'Rajdhani',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
#bgcv{position:fixed;inset:0;z-index:0;pointer-events:none}
.scanline{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.004) 2px,rgba(0,212,255,.004) 4px);pointer-events:none;z-index:9998}
#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:1px solid var(--border);background:rgba(3,6,8,.94);backdrop-filter:blur(20px)}
.logo{font-family:var(--font);font-size:13px;font-weight:900;letter-spacing:2px;background:linear-gradient(90deg,var(--gold),var(--cyan),var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
@keyframes shimmer{to{background-position:200% center}}
.topbar-r{display:flex;align-items:center;gap:7px}
.livebadge{display:flex;align-items:center;gap:5px;background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.22);border-radius:20px;padding:3px 9px;font-size:9px;font-family:var(--font);color:var(--green);letter-spacing:1px}
.ldot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.3s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(.5)}}
.clk{font-family:var(--font);font-size:9px;color:var(--muted);min-width:68px;text-align:right;letter-spacing:1px}
.apistatus{flex-shrink:0;display:flex;gap:5px;padding:4px 12px;border-bottom:1px solid var(--border);background:rgba(3,6,8,.8);overflow-x:auto;scrollbar-width:none;align-items:center}
.apistatus::-webkit-scrollbar{display:none}
.ads{display:flex;align-items:center;gap:4px;font-family:var(--font);font-size:8px;letter-spacing:.5px;padding:2px 7px;border-radius:3px;border:1px solid transparent;transition:all .3s;white-space:nowrap}
.ads .dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.ads.ok{color:var(--green);border-color:rgba(0,230,118,.2);background:rgba(0,230,118,.05)}
.ads.fail{color:var(--red);border-color:rgba(255,61,90,.2);background:rgba(255,61,90,.05)}
.ads.wait{color:var(--muted);border-color:rgba(58,85,112,.3)}
.ticker{flex-shrink:0;overflow:hidden;border-bottom:1px solid var(--border);background:rgba(3,6,8,.75);height:23px;display:flex;align-items:center}
.tickertrack{display:flex;white-space:nowrap;animation:tickmove 60s linear infinite}
.tickertrack:hover{animation-play-state:paused}
.tickitem{font-family:var(--font);font-size:8px;letter-spacing:.4px;padding:0 13px;border-right:1px solid var(--border);white-space:nowrap}
@keyframes tickmove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:11px 11px 74px;opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .25s,transform .25s;scrollbar-width:none}
.page::-webkit-scrollbar{display:none}
.page.active{opacity:1;transform:none;pointer-events:all}
.nav{flex-shrink:0;display:flex;background:rgba(3,6,8,.96);border-top:1px solid var(--border);backdrop-filter:blur(20px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px 9px;background:none;border:none;color:var(--muted);font-family:var(--body);font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;transition:color .2s;position:relative}
.nb .ni{font-size:17px;line-height:1}
.nb::before{content:'';position:absolute;top:0;left:18%;right:18%;height:2px;background:linear-gradient(90deg,var(--gold),var(--cyan));border-radius:0 0 3px 3px;transform:scaleX(0);transition:transform .25s}
.nb.active{color:var(--cyan)}.nb.active::before{transform:scaleX(1)}
.card{background:rgba(10,18,32,.88);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;position:relative;overflow:hidden;backdrop-filter:blur(6px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.4),transparent);animation:cardglow 4s ease infinite}
@keyframes cardglow{0%,100%{opacity:.3}50%{opacity:.8}}
.cg::before{background:linear-gradient(90deg,transparent,rgba(200,168,75,.5),transparent)}
.cgr::before{background:linear-gradient(90deg,transparent,rgba(0,230,118,.5),transparent)}
.crd::before{background:linear-gradient(90deg,transparent,rgba(255,61,90,.5),transparent)}
.sec{font-family:var(--font);font-size:9px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(200,168,75,.4),transparent)}
.chatwrap{position:relative;width:100%;background:rgba(3,6,8,.7);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.chatcv{display:block;width:100%}
.cr{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid rgba(20,32,53,.5);cursor:pointer;transition:all .2s}
.cr:last-child{border-bottom:none}
.cr:active,.cr:hover{background:rgba(0,212,255,.04);margin:0 -3px;padding-left:3px;padding-right:3px;border-radius:6px}
.ci{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;border:1px solid;font-family:var(--font);transition:transform .2s}
.cr:hover .ci{transform:scale(1.1)}
.cinfo{flex:1;min-width:0}
.cname{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csym{font-size:10px;color:var(--muted);font-family:var(--font);letter-spacing:1px}
.cright{text-align:right;flex-shrink:0}
.cprice{font-family:var(--font);font-size:12px;font-weight:600;transition:color .3s}
.up{color:var(--green)}.down{color:var(--red)}
.mspark{width:58px;height:22px;flex-shrink:0}
.sb{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-family:var(--font);font-size:9px;font-weight:700;letter-spacing:.8px}
.sb.buy{background:rgba(0,230,118,.11);color:var(--green);border:1px solid rgba(0,230,118,.22)}
.sb.strong-buy{background:rgba(0,230,118,.18);color:var(--green);border:1px solid var(--green);animation:sbg 2s ease infinite}
.sb.sell{background:rgba(255,61,90,.11);color:var(--red);border:1px solid rgba(255,61,90,.22)}
.sb.strong-sell{background:rgba(255,61,90,.18);color:var(--red);border:1px solid var(--red);animation:srg 2s ease infinite}
.sb.hold{background:rgba(200,168,75,.11);color:var(--gold2);border:1px solid rgba(200,168,75,.22)}
@keyframes sbg{0%,100%{box-shadow:0 0 4px rgba(0,230,118,.3)}50%{box-shadow:0 0 14px rgba(0,230,118,.7)}}
@keyframes srg{0%,100%{box-shadow:0 0 4px rgba(255,61,90,.3)}50%{box-shadow:0 0 14px rgba(255,61,90,.7)}}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sx{background:rgba(14,26,46,.8);border:1px solid var(--border);border-radius:7px;padding:8px}
.sl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.sv{font-family:var(--font);font-size:12px;font-weight:600}
.rt{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:4px 0}
.rf{height:100%;border-radius:2px;transition:width 1.2s ease}
.tabs{display:flex;gap:3px;background:var(--card2);border-radius:7px;padding:3px;margin-bottom:10px}
.tab{flex:1;padding:5px;border:none;border-radius:4px;background:none;color:var(--muted);font-family:var(--body);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.tab.active{background:var(--card);color:var(--cyan);border:1px solid var(--border)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:50px 0;color:var(--muted);font-family:var(--font);font-size:9px;letter-spacing:2px}
.spin{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.panel{position:fixed;inset:0;background:rgba(3,6,8,.97);z-index:500;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;backdrop-filter:blur(20px)}
.panel.open{transform:translateX(0)}
.ph{display:flex;align-items:center;gap:11px;padding:11px 12px;border-bottom:1px solid var(--border);background:rgba(3,6,8,.97);position:sticky;top:0;z-index:10;backdrop-filter:blur(20px)}
.bb{background:var(--card);border:1px solid var(--border);color:var(--cyan);width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0}
.pb{padding:12px}
.ar{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:11px 0}
.ab{padding:11px 5px;border-radius:8px;border:none;font-family:var(--font);font-size:9px;font-weight:700;letter-spacing:.4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .18s}
.ab:active{transform:scale(.93)}
.ab:hover{filter:brightness(1.2)}
.ab .abi{font-size:18px}
.ab-buy{background:linear-gradient(135deg,#002e12,#004a1e);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.ab-sell{background:linear-gradient(135deg,#2e000c,#4a0015);color:var(--red);border:1px solid rgba(255,61,90,.3)}
.ab-tv{background:linear-gradient(135deg,#001230,#001e4a);color:var(--cyan);border:1px solid rgba(0,212,255,.3)}
.ab-bnb{background:linear-gradient(135deg,#201600,#2e2000);color:var(--gold2);border:1px solid rgba(240,208,96,.3)}
.ab-full{grid-column:1/-1;background:var(--card2);color:var(--text);border:1px solid var(--border)}
.pc{display:inline-block;padding:3px 7px;border-radius:3px;font-family:var(--font);font-size:11px;font-weight:700}
.pc.up{color:var(--green);background:rgba(0,230,118,.09)}
.pc.down{color:var(--red);background:rgba(255,61,90,.09)}
.ir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(20,32,53,.35)}
.ir:last-child{border-bottom:none}
.il{color:var(--muted);font-size:11px}
.iv{font-family:var(--font);font-size:11px;font-weight:600}
.ainput{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;margin:4px 0;transition:border-color .2s}
.ainput:focus{border-color:var(--gold)}
.alertbtn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:6px;padding:9px;font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:5px}
.sbox{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-family:var(--body);font-size:13px;margin-bottom:10px;outline:none;transition:border-color .2s}
.sbox:focus{border-color:var(--cyan)}
.sbox::placeholder{color:var(--muted)}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:7px;font-size:12px;font-weight:600;z-index:9997;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.starbtn{background:none;border:none;font-size:17px;cursor:pointer;padding:3px;transition:transform .18s}
.starbtn:active{transform:scale(1.45) rotate(20deg)}
.feartrack{height:7px;border-radius:4px;background:linear-gradient(90deg,#ff3d5a,#ff8c00,#f0d060,#00e676);margin:8px 0;position:relative}
.fearneedle{position:absolute;top:-4px;width:15px;height:15px;background:white;border-radius:50%;border:2px solid var(--bg);transform:translateX(-50%);transition:left 1.3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 10px rgba(255,255,255,.5)}
@keyframes fu{from{opacity:0;transform:translateY(13px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .32s ease forwards}
.fu1{animation-delay:.04s;opacity:0}.fu2{animation-delay:.08s;opacity:0}.fu3{animation-delay:.12s;opacity:0}.fu4{animation-delay:.16s;opacity:0}
@keyframes flashG{0%,100%{background:transparent}40%{background:rgba(0,230,118,.16)}}
@keyframes flashR{0%,100%{background:transparent}40%{background:rgba(255,61,90,.16)}}
.fg{animation:flashG .5s ease}.fr{animation:flashR .5s ease}
.abar-wrap{flex:1;height:4px;background:rgba(20,32,53,.8);border-radius:2px;margin:0 8px;overflow:hidden}
.abar{height:100%;border-radius:2px;transition:width 1s ease}
.analysis-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(20,32,53,.3);font-size:12px}
.analysis-row:last-child{border-bottom:none}
</style>
</head>
<body>
<canvas id="bgcv"></canvas>
<div class="scanline"></div>
<div id="app">
  <div class="topbar">
    <div class="logo">&#x20BF; MR CRYPTO</div>

</div>
<div class="panel" id="dpanel">
  <div class="ph">
    <button class="bb" onclick="closeD()">&#x2039;</button>
    <div id="dtitle" style="font-family:var(--font);font-size:12px;font-weight:700;flex:1"></div>
    <button class="starbtn" id="dstar" onclick="toggleWL()">&#x2606;</button>
  </div>
  <div class="pb" id="dbody"></div>
</div>
<div class="toast" id="toast"></div>
<script>
// ==========================================
// BACKGROUND ANIMATION
// ==========================================
(function(){
  const cv=document.getElementById('bgcv');
  const ctx=cv.getContext('2d');
  let W,H;
  const resize=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight};
  resize();window.addEventListener('resize',resize);
  const pts=Array.from({length:70},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,r:Math.random()*1.5+.3,hue:Math.random()<.55?195:45,a:Math.random()*.3+.04,ph:Math.random()*Math.PI*2}));
  const scans=Array.from({length:5},()=>({y:Math.random()*H,spd:Math.random()*.2+.07,a:Math.random()*.05+.01}));
  const FTXT=['$83K','ETH','SOL','RSI','BUY','MACD','BTC','BULL','+5%','HOLD','-2%','DEFI'];
  const ftxts=Array.from({length:18},()=>({t:FTXT[Math.floor(Math.random()*FTXT.length)],x:Math.random()*W,y:Math.random()*H,vy:-(Math.random()*.28+.07),a:Math.random()*.07+.02,sz:Math.random()*4+7}));
  const orbs=[{cx:.15,cy:.3,r:80,spd:.004,phase:0},{cx:.85,cy:.7,r:60,spd:.006,phase:2},{cx:.5,cy:.1,r:50,spd:.003,phase:4}];
  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);t+=.006;
    ctx.strokeStyle='rgba(20,32,53,.38)';ctx.lineWidth=.5;
    for(let x=0;x<W;x+=44){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for(let y=0;y<H;y+=44){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
    orbs.forEach(o=>{o.phase+=o.spd;const ox=o.cx*W+Math.cos(o.phase)*20,oy=o.cy*H+Math.sin(o.phase)*15;const g=ctx.createRadialGradient(ox,oy,0,ox,oy,o.r+Math.sin(t)*(o.r*.15));g.addColorStop(0,'rgba(0,212,255,'+(0.04+Math.sin(t)*0.02)+')');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H)});
    [[0,0,180,'0,212,255'],[W,H,200,'200,168,75'],[W,0,130,'0,230,118'],[0,H,100,'255,61,90']].forEach(([cx,cy,r,col])=>{const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,'rgba('+col+','+(0.03+Math.sin(t)*.012)+')');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H)});
    scans.forEach(s=>{s.y+=s.spd;if(s.y>H+50)s.y=-50;const g=ctx.createLinearGradient(0,s.y-30,0,s.y+30);g.addColorStop(0,'transparent');g.addColorStop(.5,'rgba(0,212,255,'+s.a+')');g.addColorStop(1,'transparent');ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,s.y);ctx.lineTo(W,s.y);ctx.stroke()});
    for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<80){ctx.strokeStyle='rgba(0,212,255,'+(0.06*(1-d/80))+')';ctx.lineWidth=.35;ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke()}}}
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.ph+=.022;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;const a=p.a*(0.6+Math.sin(p.ph)*.4);ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='hsla('+p.hue+',100%,65%,'+a+')';ctx.fill()});
    ftxts.forEach(f=>{f.y+=f.vy;if(f.y<-20){f.y=H+20;f.x=Math.random()*W;f.t=FTXT[Math.floor(Math.random()*FTXT.length)]}ctx.fillStyle='rgba(0,212,255,'+f.a+')';ctx.font=f.sz+"px 'Orbitron'";ctx.fillText(f.t,f.x,f.y)});
    const sy=(Math.sin(t*.2)+1)/2*H;const sg=ctx.createLinearGradient(0,sy-4,0,sy+4);sg.addColorStop(0,'transparent');sg.addColorStop(.5,'rgba(0,212,255,.04)');sg.addColorStop(1,'transparent');ctx.fillStyle=sg;ctx.fillRect(0,sy-4,W,8);
    requestAnimationFrame(draw);
  }
  draw();
})();

// ==========================================
// TELEGRAM
// ==========================================
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#030608');tg.setBackgroundColor('#030608')}

// ==========================================
// STATE
// ==========================================

// BUILD allCoins from COINDB with sparklines
// ==========================================
function buildCoin(d){
  // Generate realistic sparkline from price + volatility
  const spark=[];let p=d.price;
  for(let i=80;i>0;i--){
    const v=Math.abs(d.ch7)/100/80;
    const drift=(Math.random()-.5)*2*v*p;
    p=Math.max(p*.001,p+drift);
    spark.unshift(p);
  }
  spark.push(d.price);
  return{
    id:d.id,name:d.n,symbol:d.s,
    current_price:d.price,
    market_cap:d.mc,
    total_volume:d.vol,
    price_change_percentage_24h_in_currency:d.ch24,
    price_change_percentage_1h_in_currency:d.ch1,
    price_change_percentage_7d_in_currency:d.ch7,
    market_cap_rank:d.rank,
    sparkline_in_7d:{price:spark},
    high_24h:d.price*(1+Math.abs(d.ch24)/100*.8),
    low_24h:d.price*(1-Math.abs(d.ch24)/100*.8),
    ath:d.ath,
    ath_change_percentage:((d.price-d.ath)/d.ath)*100,
    circulating_supply:d.supply,
    _fg:d.fg
  };
}

function ftch(url,ms=12000){
  return new Promise(resolve=>{
    const t=setTimeout(()=>resolve(null),ms);
    fetch(url)
      .then(r=>r.ok?r.json():null)
      .then(d=>{clearTimeout(t);resolve(d)})
      .catch(()=>{clearTimeout(t);resolve(null)});
  });
}

// PRICE HISTORY + LIVE TICK ENGINE
// ==========================================
let pH={};
function initH(coin){
  const id=coin.id;if(pH[id])return;
  const sp=coin.sparkline_in_7d?.price||[];
  if(sp.length>1){
    pH[id]=sp.slice(-80).map((v,i)=>({t:Date.now()-(80-i)*60000,o:v,h:v*(1+Math.random()*.003),l:v*(1-Math.random()*.003),c:v}));
  } else {
    let p=coin.current_price||1;const h=[];
    for(let i=80;i>0;i--){const dv=(Math.random()-.49)*p*.003;p=Math.max(p*.001,p+dv);h.unshift({t:Date.now()-i*60000,o:p,h:p*(1+Math.random()*.002),l:p*(1-Math.random()*.002),c:p})}
    pH[id]=h;
  }
  lastPx[id]=coin.current_price||1;
}
function tick(id){
  const h=pH[id];if(!h||!h.length)return null;
  const last=h[h.length-1],base=lastPx[id]||last.c||1;
  const drift=(base-last.c)*.05+(Math.random()-.48)*base*.0005;
  const np=Math.max(base*.0001,last.c+drift);
  const now=Date.now();
  if(now-last.t>60000){h.push({t:now,o:np,h:np,l:np,c:np});if(h.length>120)h.shift()}
  else{last.c=np;last.h=Math.max(last.h,np);last.l=Math.min(last.l,np)}
  return np;
}
setInterval(()=>allCoins.forEach(c=>tick(c.id)),1000);

// ==========================================
// ANIMATED CHART ENGINE
// ==========================================
function startChart(id,coinId,H,showAn=false){
  const cv=document.getElementById(id);if(!cv)return;
  cv.height=H;const W=cv.offsetWidth||300;cv.width=W;
  const ctx=cv.getContext('2d');let fc=0;
  function draw(){
    const hist=pH[coinId];
    if(!hist||hist.length<2){animFrames[id]=requestAnimationFrame(draw);return}
    ctx.clearRect(0,0,W,H);fc++;
    const pad={t:10,b:5,l:2,r:48};
    const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
    const mn=Math.min(...hist.map(c=>c.l))*.9998;
    const mx=Math.max(...hist.map(c=>c.h))*1.0002;
    const rng=mx-mn||mn*.001;
    const ty=v=>pad.t+ch-((v-mn)/rng)*ch;
    const tx=(i,n)=>pad.l+(i/Math.max(n-1,1))*cw;
    // Grid
    ctx.strokeStyle='rgba(20,32,53,'+(0.45+Math.sin(fc*.025)*.1)+')';ctx.lineWidth=.4;
    for(let i=0;i<=4;i++){const y=pad.t+(ch/4)*i;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r+4,y);ctx.stroke()}
    const last=hist[hist.length-1],first=hist[0];
    const isUp=last.c>=first.c;
    const lc=isUp?'#00e676':'#ff3d5a',gc=isUp?'rgba(0,230,118,':'rgba(255,61,90,';
    // Area
    const br=Math.sin(fc*.03)*.03;
    const gr=ctx.createLinearGradient(0,pad.t,0,H);
    gr.addColorStop(0,gc+(0.14+br)+')');gr.addColorStop(.6,gc+(0.05+br*.5)+')');gr.addColorStop(1,gc+'0)');
    ctx.beginPath();ctx.moveTo(tx(0,hist.length),ty(hist[0].c));
    hist.forEach((c,i)=>ctx.lineTo(tx(i,hist.length),ty(c.c)));
    ctx.lineTo(tx(hist.length-1,hist.length),H);ctx.lineTo(tx(0,hist.length),H);
    ctx.closePath();ctx.fillStyle=gr;ctx.fill();
    // Price line
    ctx.beginPath();ctx.moveTo(tx(0,hist.length),ty(hist[0].c));
    hist.forEach((c,i)=>ctx.lineTo(tx(i,hist.length),ty(c.c)));
    ctx.strokeStyle=lc;ctx.lineWidth=2;ctx.lineJoin='round';
    ctx.shadowColor=lc;ctx.shadowBlur=4+Math.sin(fc*.06)*2;ctx.stroke();ctx.shadowBlur=0;
    // Candles right side
    const cd=hist.slice(-24),cs=W-pad.r,cwd=pad.r-3,cw2=cwd/cd.length;
    cd.forEach((c,i)=>{
      const x=cs+i*cw2+cw2/2,col=c.c>=c.o?'#00e676':'#ff3d5a';
      ctx.strokeStyle=col;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(x,ty(c.h));ctx.lineTo(x,ty(c.l));ctx.stroke();
      const by1=ty(Math.max(c.o,c.c)),bh=Math.max(1.5,ty(Math.min(c.o,c.c))-by1);
      ctx.fillStyle=col;ctx.globalAlpha=.82;ctx.fillRect(x-cw2*.4,by1,cw2*.8,bh);ctx.globalAlpha=1;
    });
    // Marching ants
    const curY=ty(last.c),doff=(fc*1.8)%16;
    ctx.setLineDash([3,4]);ctx.lineDashOffset=-doff;
    ctx.strokeStyle=isUp?'rgba(0,230,118,.28)':'rgba(255,61,90,.28)';ctx.lineWidth=1;ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(pad.l,curY);ctx.lineTo(W-pad.r+2,curY);ctx.stroke();
    ctx.setLineDash([]);ctx.lineDashOffset=0;
    // Pulsing dot
    const pr=2.8+Math.sin(fc*.1)*1;
    ctx.beginPath();ctx.arc(tx(hist.length-1,hist.length),curY,pr,0,Math.PI*2);
    ctx.fillStyle=lc;ctx.shadowColor=lc;ctx.shadowBlur=8+Math.sin(fc*.08)*4;ctx.fill();
    ctx.beginPath();ctx.arc(tx(hist.length-1,hist.length),curY,pr+3+Math.sin(fc*.08)*1.5,0,Math.PI*2);
    ctx.strokeStyle=isUp?'rgba(0,230,118,.2)':'rgba(255,61,90,.2)';ctx.lineWidth=1;ctx.shadowBlur=0;ctx.stroke();
    // Price label
    ctx.fillStyle=lc;ctx.font="bold 9px 'Orbitron'";ctx.textAlign='right';
    ctx.fillText(fp(last.c),W-1,Math.max(14,Math.min(H-3,curY+3)));
    // Y labels
    ctx.fillStyle='rgba(58,85,112,.9)';ctx.font="8px Rajdhani";ctx.textAlign='right';
    [mn,mn+(mx-mn)*.5,mx].forEach(v=>ctx.fillText(fp(v),W-1,ty(v)+3));
    // Analysis overlay
    if(showAn){
      const sp=hist.map(c=>c.c);
      const rsi=cRSI(sp);const s7=cSMA(sp,Math.min(49,sp.length));
      if(rsi!=null){
        const rc=rsi<30?'#00e676':rsi>70?'#ff3d5a':'#f0d060';
        ctx.fillStyle='rgba(3,6,8,.8)';ctx.beginPath();if(ctx.roundRect)ctx.roundRect(4,pad.t,52,13,2);else ctx.rect(4,pad.t,52,13);ctx.fill();
        ctx.fillStyle=rc;ctx.font="bold 8px 'Orbitron'";ctx.textAlign='left';ctx.fillText('RSI:'+rsi,7,pad.t+9);
      }
      if(s7){const sy=ty(s7);ctx.setLineDash([2,4]);ctx.strokeStyle='rgba(200,168,75,.45)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,sy);ctx.lineTo(W-pad.r,sy);ctx.stroke();ctx.setLineDash([])}
    }
    animFrames[id]=requestAnimationFrame(draw);
  }
  if(animFrames[id])cancelAnimationFrame(animFrames[id]);
  animFrames[id]=requestAnimationFrame(draw);
}
function stopChart(id){if(animFrames[id]){cancelAnimationFrame(animFrames[id]);delete animFrames[id]}}

// Sparkline SVG
function spark(prices,color){
  if(!prices||prices.length<2)return'';
  const w=58,h=22,sl=prices.slice(-20);
  const mn=Math.min(...sl),mx=Math.max(...sl),rng=mx-mn||1;
  const pts=sl.map((p,i)=>`${(i/(sl.length-1))*w},${h-((p-mn)/rng)*h}`).join(' ');
  const id='sk'+Math.random().toString(36).slice(2,5);
  return`<svg class="mspark" viewBox="0 0 ${w} ${h}"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon points="${pts} ${w},${h} 0,${h}" fill="url(#${id})"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

// ==========================================
// SIGNAL ENGINE (RSI+SMA+MACD+Boll+Stoch)
// ==========================================
function cRSI(p,n=14){if(!p||p.length<n+1)return null;let g=[],l=[];for(let i=1;i<p.length;i++){const d=p[i]-p[i-1];g.push(Math.max(d,0));l.push(Math.max(-d,0))}const ag=g.slice(-n).reduce((a,b)=>a+b,0)/n,al=l.slice(-n).reduce((a,b)=>a+b,0)/n;return al===0?100:Math.round(100-(100/(1+ag/al)))}
function cSMA(p,n){if(!p||p.length<n)return null;return p.slice(-n).reduce((a,b)=>a+b,0)/n}
function cEMA(p,n){if(!p||p.length<n)return null;let k=2/(n+1),e=p.slice(0,n).reduce((a,b)=>a+b,0)/n;for(let i=n;i<p.length;i++)e=p[i]*k+e*(1-k);return e}
function cMACD(p){if(!p||p.length<26)return{m:null,s:null};const e12=cEMA(p,12),e26=cEMA(p,26);if(!e12||!e26)return{m:null,s:null};const m=e12-e26;return{m,s:m*.9}}
function cBoll(p,n=20){const s=cSMA(p,n);if(!s)return{u:null,l:null};const sl=p.slice(-n),v=sl.reduce((a,b)=>a+Math.pow(b-s,2),0)/n;return{u:s+2*Math.sqrt(v),l:s-2*Math.sqrt(v)}}
function cStoch(p,n=14){if(!p||p.length<n)return null;const sl=p.slice(-n),mn=Math.min(...sl),mx=Math.max(...sl);return mx===mn?50:Math.round(((p[p.length-1]-mn)/(mx-mn))*100)}

function getSig(coin){
  const sp=coin.sparkline_in_7d?.price||[];
  const rsi=cRSI(sp),s7=cSMA(sp,Math.min(49,sp.length)),s25=cSMA(sp,Math.min(168,sp.length));
  const{m:macd,s:ms}=cMACD(sp);const boll=cBoll(sp);const stoch=cStoch(sp);
  const ch24=coin.price_change_percentage_24h_in_currency||0;
  const ch1=coin.price_change_percentage_1h_in_currency||0;
  const vol=coin.total_volume||0,mcap=coin.market_cap||1,price=coin.current_price||0,ath=coin.ath||0;
  let sc=0,tags=[];
  if(rsi!=null){if(rsi<20){sc+=5;tags.push('EXTREME OVERSOLD')}else if(rsi<30){sc+=3;tags.push('OVERSOLD')}else if(rsi>80){sc-=5;tags.push('EXTREME OB')}else if(rsi>70){sc-=3;tags.push('OVERBOUGHT')}else if(rsi<45)sc+=1;else if(rsi>55)sc-=1}
  if(s7&&s25){if(s7>s25){sc+=2;tags.push('BULL CROSS')}else{sc-=2;tags.push('BEAR CROSS')}}
  if(macd&&ms){if(macd>ms){sc+=1;tags.push('MACD BULL')}else{sc-=1;tags.push('MACD BEAR')}}
  if(boll.l&&price<boll.l){sc+=2;tags.push('BOLL OVERSOLD')}else if(boll.u&&price>boll.u){sc-=2;tags.push('BOLL OB')}
  if(stoch!=null){if(stoch<20){sc+=1;tags.push('STOCH LOW')}else if(stoch>80){sc-=1;tags.push('STOCH HIGH')}}
  if(ch24>10){sc+=3;tags.push('PUMPING')}else if(ch24>5){sc+=2;tags.push('MOMENTUM')}else if(ch24<-10){sc-=3;tags.push('DUMPING')}else if(ch24<-5)sc-=2;
  if(ch1>3){sc+=1;tags.push('1H SURGE')}else if(ch1<-3){sc-=1;tags.push('1H DROP')}
  if(mcap>0&&vol/mcap>0.2){sc+=2;tags.push('HIGH VOL')}else if(mcap>0&&vol/mcap>0.1)sc+=1;
  if(ath&&price){const d=((price-ath)/ath)*100;if(d>-10)tags.push('NEAR ATH');else if(d<-70){sc+=1;tags.push('DISCOUNTED')}}
  let label,cls;
  if(sc>=7){label='STRONG BUY';cls='strong-buy'}else if(sc>=3){label='BUY';cls='buy'}else if(sc<=-7){label='STRONG SELL';cls='strong-sell'}else if(sc<=-3){label='SELL';cls='sell'}else{label='HOLD';cls='hold'}
  return{sc,label,cls,rsi,s7,s25,macd,boll,stoch,tags,ch24,ch1}
}

function fp(p){if(!p||isNaN(p))return'$0';if(p>=1e6)return'$'+p.toLocaleString('en',{maximumFractionDigits:0});if(p>=1000)return'$'+p.toLocaleString('en',{maximumFractionDigits:2});if(p>=1)return'$'+p.toFixed(4);if(p>=.001)return'$'+p.toFixed(6);return'$'+p.toFixed(10)}
function fb(n){if(!n||isNaN(n))return'$0';if(n>=1e12)return'$'+(n/1e12).toFixed(2)+'T';if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';return'$'+n.toLocaleString()}
function fc(v,s=false){if(v==null||isNaN(v))return'<span style="color:var(--muted)">-</span>';const u=v>=0,cls=u?'up':'down',sign=u?'+':'',icon=u?'&#x25B2;':'&#x25BC;';return s?`<span class="${cls}">${icon}${Math.abs(v).toFixed(2)}%</span>`:`<span class="pc ${cls}">${sign}${v.toFixed(2)}%</span>`}

  else if(health<35){adv='Bearish pressure dominates. Wait for RSI oversold + volume confirmation before new positions.';ac='var(--red)';ai='&#x1F4C9;'}
  else{adv='Mixed signals. Wait for breakout confirmation or DCA into fundamentally strong assets only.';ac='var(--gold2)';ai='&#x23F3;'}
  $s('pg-intel',`<div class="card cg fu"><div class="sec">&#x1F9E0; MARKET INTELLIGENCE</div><div class="ir"><span class="il">Fear &amp; Greed</span><span class="iv" style="color:${fv<45?'var(--red)':fv>55?'var(--green)':'var(--gold2)'}">${fv}/100 &mdash; ${fcl}</span></div><div class="ir"><span class="il">Market Health</span><span class="iv" style="color:${hc}">${health}% Bullish</span></div><div class="ir"><span class="il">Buy Signals</span><span class="iv" style="color:var(--green)">${bull} / ${allCoins.length}</span></div><div class="ir"><span class="il">Sell Signals</span><span class="iv" style="color:var(--red)">${sell} / ${allCoins.length}</span></div><div class="ir"><span class="il">Top Volume</span><span class="iv" style="color:var(--cyan)">${tV?gm(tV.id).sym:'-'} ${fb(tV?.total_volume||0)}</span></div><div class="ir"><span class="il">Top Gainer 24h</span><span class="iv" style="color:var(--green)">${tG?gm(tG.id).sym:'-'} ${fc(tG?.price_change_percentage_24h_in_currency,true)}</span></div><div class="ir"><span class="il">Top Loser 24h</span><span class="iv" style="color:var(--red)">${tL?gm(tL.id).sym:'-'} ${fc(tL?.price_change_percentage_24h_in_currency,true)}</span></div><div class="ir"><span class="il">Total Market Cap</span><span class="iv">${fb(allCoins.reduce((s,c)=>s+(c.market_cap||0),0))}</span></div><div class="ir"><span class="il">Coins Tracked</span><span class="iv" style="color:var(--gold2)">${allCoins.length}</span></div></div><div class="card fu fu2" style="border-color:${ac}33"><div class="sec" style="color:${ac}">${ai} AI SIGNAL ADVICE</div><div style="font-size:13px;line-height:1.7">${adv}</div><div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)"><div style="font-size:9px;color:var(--muted);font-family:var(--font);letter-spacing:1px;margin-bottom:5px">MARKET HEALTH</div><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;width:${health}%;background:${hc};border-radius:3px"></div></div><span style="font-family:var(--font);font-size:12px;font-weight:700;color:${hc}">${health}%</span></div></div></div><div class="card fu fu3"><div class="sec">&#x1F4D6; SIGNAL LOGIC</div><div class="ir"><span class="il">RSI &lt; 30</span><span class="iv" style="color:var(--green)">+3 pts Oversold</span></div><div class="ir"><span class="il">RSI &gt; 70</span><span class="iv" style="color:var(--red)">-3 pts Overbought</span></div><div class="ir"><span class="il">SMA Bull Cross</span><span class="iv" style="color:var(--green)">+2 pts</span></div><div class="ir"><span class="il">MACD Bullish</span><span class="iv" style="color:var(--green)">+1 pt</span></div><div class="ir"><span class="il">Bollinger Low</span><span class="iv" style="color:var(--green)">+2 pts</span></div><div class="ir"><span class="il">Stochastic Low</span><span class="iv" style="color:var(--green)">+1 pt</span></div><div class="ir"><span class="il">Score &#x2265; 7</span><span class="iv" style="color:var(--green)">STRONG BUY</span></div><div class="ir"><span class="il">Score &#x2264; -7</span><span class="iv" style="color:var(--red)">STRONG SELL</span></div></div><div style="text-align:center;font-size:8px;color:var(--muted);padding:7px 0 2px;font-family:var(--font)">NOT FINANCIAL ADVICE | DYOR | ${ts()}</div>`);
}

// ==========================================
// DETAIL PANEL WITH LIVE ANALYSIS
// ==========================================
function openD(id){
  const coin=allCoins.find(c=>c.id===id);if(!coin)return;
  detailId=id;const m=gm(id),sig=getSig(coin);
  const ch1=coin.price_change_percentage_1h_in_currency||0;
  const ch24=coin.price_change_percentage_24h_in_currency||0;
  const ch7=coin.price_change_percentage_7d_in_currency||0;
  const inWL=wl.includes(id);
  document.getElementById('dstar').innerHTML=inWL?'&#x2605;':'&#x2606;';
  document.getElementById('dtitle').innerHTML=`<span style="color:${m.fg}">${m.icon}</span> ${coin.name} <span style="color:var(--muted);font-size:9px">${m.sym} #${coin.market_cap_rank||'?'}</span>`;
  const rc=sig.rsi!=null&&sig.rsi<30?'var(--green)':sig.rsi!=null&&sig.rsi>70?'var(--red)':'var(--gold2)';
  const tagsHtml=sig.tags.slice(0,6).map(t=>`<span style="background:var(--card2);border:1px solid var(--border);color:var(--cyan);padding:1px 6px;border-radius:3px;font-size:8px;font-family:var(--font)">${t}</span>`).join(' ');
  const indRows=[
    {label:'RSI (14)',val:sig.rsi??'-',color:rc,pct:(sig.rsi||50)},
    {label:'Stochastic',val:sig.stoch??'-',color:sig.stoch!=null&&sig.stoch<20?'var(--green)':sig.stoch!=null&&sig.stoch>80?'var(--red)':'var(--gold2)',pct:(sig.stoch||50)},
    {label:'Signal Score',val:(sig.sc>0?'+':'')+sig.sc,color:sig.sc>0?'var(--green)':sig.sc<0?'var(--red)':'var(--gold2)',pct:Math.min(100,Math.max(0,(sig.sc+10)*5))},
    {label:'Bull/Bear Ratio',val:Math.round((allCoins.filter(c=>getSig(c).cls.includes('buy')).length/allCoins.length)*100)+'%',color:'var(--cyan)',pct:Math.round((allCoins.filter(c=>getSig(c).cls.includes('buy')).length/allCoins.length)*100)},
  ].map(r=>`<div class="analysis-row"><span style="color:var(--muted);font-size:11px;min-width:90px">${r.label}</span><div class="abar-wrap"><div class="abar" style="width:${r.pct}%;background:${r.color}"></div></div><span style="font-family:var(--font);font-size:11px;font-weight:600;color:${r.color};min-width:50px;text-align:right">${r.val}</span></div>`).join('');
  document.getElementById('dbody').innerHTML=`
    <div style="text-align:center;padding:14px 0 10px">
      <div style="font-family:var(--font);font-size:24px;font-weight:700;letter-spacing:-1px" id="dlp" data-p="${coin.current_price}">${fp(coin.current_price)}</div>
      <div style="display:flex;justify-content:center;gap:6px;margin-top:7px;flex-wrap:wrap">
        ${fc(ch1)}<span style="color:var(--muted);font-size:10px;align-self:center">1h</span>
        ${fc(ch24)}<span style="color:var(--muted);font-size:10px;align-self:center">24h</span>
        ${fc(ch7)}<span style="color:var(--muted);font-size:10px;align-self:center">7d</span>
      </div>
      <div style="margin-top:9px"><span class="sb ${sig.cls}" style="font-size:11px;padding:7px 16px">${sig.label}</span></div>
      ${tagsHtml?`<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center">${tagsHtml}</div>`:''}
    </div>
    <div style="margin-bottom:6px"><div class="chatwrap" style="height:200px"><canvas class="chatcv" id="cv-detail" style="height:200px"></canvas></div></div>
    <div class="card" style="margin-bottom:8px">
      <div class="sec">&#x1F4F9; LIVE ANALYSIS</div>
      <div style="background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.15);border-radius:8px;padding:10px">${indRows}</div>
    </div>
    <div class="ar">
      <button class="ab ab-buy" onclick="openBuy('${m.sym}')"><span class="abi">&#x1F7E2;</span>BUY BINANCE</button>
      <button class="ab ab-sell" onclick="openSell('${m.sym}')"><span class="abi">&#x1F534;</span>SELL BINANCE</button>
      <button class="ab ab-tv" onclick="openTV('${m.sym}')"><span class="abi">&#x1F4CA;</span>TRADINGVIEW</button>
      <button class="ab ab-bnb" onclick="openBNB('${m.sym}')"><span class="abi">&#x1F49B;</span>BINANCE APP</button>
      <button class="ab ab-full" onclick="openCG('${id}')"><span class="abi">&#x1F50D;</span>FULL INFO COINGECKO</button>
    </div>
    <div class="sg" style="margin-bottom:8px">
      <div class="sx"><div class="sl">Market Cap</div><div class="sv">${fb(coin.market_cap||0)}</div></div>
      <div class="sx"><div class="sl">24h Volume</div><div class="sv">${fb(coin.total_volume||0)}</div></div>
      <div class="sx"><div class="sl">24h High</div><div class="sv up">${fp(coin.high_24h||0)}</div></div>
      <div class="sx"><div class="sl">24h Low</div><div class="sv down">${fp(coin.low_24h||0)}</div></div>
      <div class="sx"><div class="sl">All Time High</div><div class="sv">${fp(coin.ath||0)}</div></div>
      <div class="sx"><div class="sl">ATH Change</div><div class="sv ${(coin.ath_change_percentage||0)>=0?'up':'down'}">${(coin.ath_change_percentage||0).toFixed(1)}%</div></div>
      <div class="sx"><div class="sl">Supply</div><div class="sv" style="font-size:10px">${(coin.circulating_supply||0).toLocaleString('en',{maximumFractionDigits:0})}</div></div>
      <div class="sx"><div class="sl">Rank</div><div class="sv" style="color:var(--gold2)">#${coin.market_cap_rank||'?'}</div></div>
    </div>
    <div class="card" style="margin-bottom:8px">
      <div class="sec">&#x1F52C; TECHNICAL INDICATORS</div>
      <div class="ir"><span class="il">RSI (14)</span><span class="iv" style="color:${rc}">${sig.rsi??'-'} &mdash; ${sig.rsi!=null&&sig.rsi<30?'Oversold':sig.rsi!=null&&sig.rsi>70?'Overbought':'Neutral'}</span></div>
      ${sig.rsi!=null?`<div class="rt"><div class="rf" style="width:${sig.rsi}%;background:${rc}"></div></div>`:''}
      <div class="ir"><span class="il">Stochastic</span><span class="iv">${sig.stoch??'-'}</span></div>
      <div class="ir"><span class="il">SMA 7d</span><span class="iv">${sig.s7?fp(sig.s7):'-'}</span></div>
      <div class="ir"><span class="il">SMA 25d</span><span class="iv">${sig.s25?fp(sig.s25):'-'}</span></div>
      <div class="ir"><span class="il">MACD</span><span class="iv" style="color:${sig.macd&&sig.macd>0?'var(--green)':'var(--red)'}">${sig.macd?sig.macd.toFixed(6):'-'}</span></div>
      <div class="ir"><span class="il">Boll. Upper</span><span class="iv">${sig.boll.u?fp(sig.boll.u):'-'}</span></div>
      <div class="ir"><span class="il">Boll. Lower</span><span class="iv">${sig.boll.l?fp(sig.boll.l):'-'}</span></div>
    </div>
    <div class="card">
      <div class="sec">&#x1F514; SET PRICE ALERT</div>
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:10px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:5px">Current: <b style="color:var(--text)">${fp(coin.current_price)}</b></div>
        <input class="ainput" id="aa" placeholder="Alert when ABOVE $..." type="number" step="any"/>
        <input class="ainput" id="ab2" placeholder="Alert when BELOW $..." type="number" step="any"/>
        <button class="alertbtn" onclick="setAlert('${id}')">&#x23F0; SET ALERT</button>
      </div>
    </div>
    <div style="font-size:8px;color:var(--muted);text-align:center;padding:7px 0 4px;font-family:var(--font)">NOT FINANCIAL ADVICE | DYOR | ${ts()}</div>`;
  document.getElementById('dpanel').classList.add('open');
  setTimeout(()=>{
    startChart('cv-detail',id,200,true);
    if(detailTick)clearInterval(detailTick);
    detailTick=setInterval(()=>{
      const np=tick(id);const el=document.getElementById('dlp');
      if(el&&np){const op=parseFloat(el.dataset.p||'0');if(Math.abs(np-op)/Math.max(op,.001)>0.00005){el.dataset.p=np;el.textContent=fp(np);el.style.color=np>op?'var(--green)':'var(--red)';setTimeout(()=>{if(el)el.style.color=''},500)}}
    },1000);
  },60);
}
function closeD(){document.getElementById('dpanel').classList.remove('open');stopChart('cv-detail');if(detailTick){clearInterval(detailTick);detailTick=null}detailId=null;if(loaded.has('wl'))renderWL()}
function toggleWL(){if(!detailId)return;const i=wl.indexOf(detailId);if(i>=0){wl.splice(i,1);showToast('Removed from watchlist')}else{wl.push(detailId);showToast('&#x2B50; Added to watchlist','gold')}saveWL();document.getElementById('dstar').innerHTML=wl.includes(detailId)?'&#x2605;':'&#x2606;'}
function setAlert(id){const above=parseFloat(document.getElementById('aa').value)||null;const below=parseFloat(document.getElementById('ab2').value)||null;if(!above&&!below){showToast('Enter at least one price','red');return}pal[id]={above,below};localStorage.setItem('pal',JSON.stringify(pal));showToast('&#x23F0; Alert set!','gold');document.getElementById('aa').value='';document.getElementById('ab2').value=''}

// ==========================================
// NAVIGATION
// ==========================================
function gp(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('pg-'+name).classList.add('active');btn.classList.add('active');curPage=name;
  if(name!=='dash'){stopChart('cv-btc');stopChart('cv-eth')}
  if(!loaded.has(name)||name==='wl'){loaded.add(name);switch(name){case'dash':renderDash();break;case'mkt':renderMkt();break;case'sig':renderSig();break;case'wl':renderWL();break;case'intel':renderIntel();break}}
  else if(name==='dash'){setTimeout(()=>{if(allCoins.find(c=>c.id==='bitcoin'))startChart('cv-btc','bitcoin',160,true);if(allCoins.find(c=>c.id==='ethereum'))startChart('cv-eth','ethereum',120,true);},50)}
}

// Clock
setInterval(()=>{const n=new Date(),h=n.getUTCHours().toString().padStart(2,'0'),m=n.getUTCMinutes().toString().padStart(2,'0'),s=n.getUTCSeconds().toString().padStart(2,'0');const el=document.getElementById('clk');if(el)el.textContent=h+':'+m+':'+s},1000);

// ==========================================
// INIT - Load local data first, then enrich with live APIs
// ==========================================
async function init(){
  // Step 1: Load all 300 coins from local database INSTANTLY
  allCoins=COINDB.map(buildCoin);
  allCoins.forEach(c=>initH(c));
  gdata=computeGlobal();
  loaded.add('dash');
  renderDash();
  updateTicker();
  console.log('Loaded',allCoins.length,'coins from local database');

  // Step 2: Enrich with live prices from CoinCap (CORS-safe)
  await Promise.all([fetchCC(),fetchFG()]);
  await fetchBN(); // Binance for real-time top coins
  gdata=computeGlobal(); // recompute from updated prices
  renderDash();
  updateTicker();
  console.log('Live data enrichment complete');

  // Step 3: Auto-refresh every 30 seconds
  setInterval(async()=>{
    await Promise.all([fetchCC(),fetchFG()]);
    await fetchBN();
    gdata=computeGlobal();
    updateTicker();
    checkPal();
    if(loaded.has(curPage)){loaded.delete(curPage);gp(curPage,document.querySelector('.nb.active'))}
  },30000);

  // Binance every 8 seconds for top coin prices
  setInterval(fetchBN,8000);
}
init();
</script>
</body>
</html>
