<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Mr Crypto — Trading Terminal</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#050810;--surface:#090e1c;--card:#0d1526;--card2:#111e35;--border:#1a2d4a;--gold:#c8a84b;--gold2:#f0d060;--cyan:#00d4ff;--green:#00e676;--red:#ff3d5a;--text:#e8f0f8;--muted:#4a6a8a;--font:'Orbitron',monospace;--body:'Rajdhani',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,.012) 3px,rgba(0,212,255,.012) 4px);pointer-events:none;z-index:999}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}
#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid var(--border);background:rgba(5,8,16,.97);backdrop-filter:blur(20px)}
.logo{font-family:var(--font);font-size:13px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--gold),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-right{display:flex;align-items:center;gap:8px}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);border-radius:20px;padding:3px 9px;font-size:10px;font-family:var(--font);color:var(--green);letter-spacing:1px}
.live-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease infinite}
.clock{font-family:var(--font);font-size:9px;color:var(--muted);letter-spacing:1px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:14px 14px 80px;opacity:0;transform:translateY(12px);pointer-events:none;transition:opacity .3s ease,transform .3s ease;scrollbar-width:none}
.page::-webkit-scrollbar{display:none}
.page.active{opacity:1;transform:translateY(0);pointer-events:all}
.nav{flex-shrink:0;display:flex;background:rgba(5,8,16,.97);border-top:1px solid var(--border);backdrop-filter:blur(20px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px 11px;background:none;border:none;color:var(--muted);font-family:var(--body);font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:color .2s;position:relative}
.nb .ni{font-size:19px;line-height:1}
.nb::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;background:linear-gradient(90deg,var(--gold),var(--cyan));border-radius:0 0 4px 4px;transform:scaleX(0);transition:transform .3s ease}
.nb.active{color:var(--cyan)}
.nb.active::before{transform:scaleX(1)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.35}
.cg::before{background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.cgr::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.crd::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.sec{font-family:var(--font);font-size:9px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.cr{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(26,45,74,.4);cursor:pointer;transition:all .2s;border-radius:0}
.cr:last-child{border-bottom:none}
.cr:active{background:rgba(0,212,255,.05);margin:0 -4px;padding-left:4px;padding-right:4px;border-radius:8px}
.ci{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;border:1px solid var(--border);font-family:var(--font)}
.cinfo{flex:1;min-width:0}
.cname{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csym{font-size:11px;color:var(--muted);font-family:var(--font);letter-spacing:1px}
.cright{text-align:right;flex-shrink:0}
.cprice{font-family:var(--font);font-size:13px;font-weight:600}
.up{color:var(--green)}.down{color:var(--red)}
.sb{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:5px;font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:1px}
.sb.buy{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.sb.strong-buy{background:rgba(0,230,118,.25);color:var(--green);border:1px solid var(--green)}
.sb.sell{background:rgba(255,61,90,.15);color:var(--red);border:1px solid rgba(255,61,90,.3)}
.sb.strong-sell{background:rgba(255,61,90,.25);color:var(--red);border:1px solid var(--red)}
.sb.hold{background:rgba(200,168,75,.15);color:var(--gold2);border:1px solid rgba(200,168,75,.3)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sx{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px}
.sl{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.sv{font-family:var(--font);font-size:13px;font-weight:600}
.rt{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:5px 0}
.rf{height:100%;border-radius:3px;transition:width 1s ease}
.tabs{display:flex;gap:3px;background:var(--card2);border-radius:8px;padding:3px;margin-bottom:12px}
.tab{flex:1;padding:6px;border:none;border-radius:5px;background:none;color:var(--muted);font-family:var(--body);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.tab.active{background:var(--card);color:var(--cyan);border:1px solid var(--border)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 0;color:var(--muted);font-family:var(--font);font-size:10px;letter-spacing:2px}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sparkline{width:64px;height:26px}
.chart-area{background:var(--card);border:1px solid var(--border);border-radius:10px;height:160px;display:flex;align-items:flex-end;padding:10px 6px 6px;gap:2px;overflow:hidden;margin-bottom:10px}
.cb{flex:1;border-radius:2px 2px 0 0;min-height:3px}
.panel{position:fixed;inset:0;background:var(--bg);z-index:500;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.panel.open{transform:translateX(0)}
.ph{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--border);background:rgba(5,8,16,.97);position:sticky;top:0;z-index:10;backdrop-filter:blur(20px)}
.bb{background:var(--card);border:1px solid var(--border);color:var(--cyan);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0}
.pb{padding:14px}
.ar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.ab{padding:12px 8px;border-radius:10px;border:none;font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s}
.ab:active{transform:scale(.96)}
.ab .abi{font-size:20px}
.ab-buy{background:linear-gradient(135deg,#003d1a,#005a28);color:var(--green);border:1px solid rgba(0,230,118,.4)}
.ab-sell{background:linear-gradient(135deg,#3d0010,#5a0018);color:var(--red);border:1px solid rgba(255,61,90,.4)}
.ab-bnb{background:linear-gradient(135deg,#2a1f00,#3d2e00);color:var(--gold2);border:1px solid rgba(243,186,47,.4)}
.ab-tv{background:linear-gradient(135deg,#001a3d,#00285a);color:var(--cyan);border:1px solid rgba(0,212,255,.4)}
.ab-full{grid-column:1/-1;background:var(--card2);color:var(--text);border:1px solid var(--border)}
.pb2{font-family:var(--font);font-size:26px;font-weight:700;letter-spacing:-1px}
.pc{display:inline-block;padding:3px 8px;border-radius:4px;font-family:var(--font);font-size:12px;font-weight:700}
.pc.up{color:var(--green);background:rgba(0,230,118,.12)}
.pc.down{color:var(--red);background:rgba(255,61,90,.12)}
.ir{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(26,45,74,.35);font-size:13px}
.ir:last-child{border-bottom:none}
.il{color:var(--muted);font-size:12px}
.iv{font-family:var(--font);font-size:12px;font-weight:600}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s ease;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.starbtn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;transition:transform .2s}
.starbtn:active{transform:scale(1.3)}
.ai{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px}
.ainput{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;margin:6px 0}
.ainput:focus{border-color:var(--gold)}
.alertbtn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:6px;padding:10px;font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;margin-top:6px}
.sbox{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-family:var(--body);font-size:14px;margin-bottom:12px;outline:none;transition:border-color .2s}
.sbox:focus{border-color:var(--cyan)}
.sbox::placeholder{color:var(--muted)}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .4s ease forwards}
.fu1{animation-delay:.05s;opacity:0}.fu2{animation-delay:.1s;opacity:0}.fu3{animation-delay:.15s;opacity:0}.fu4{animation-delay:.2s;opacity:0}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">₿ MR CRYPTO</div>
    <div class="topbar-right">
      <div class="clock" id="clk">00:00:00 UTC</div>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    </div>
  </div>
  <div class="pages">
    <div class="page active" id="page-dashboard"><div class="loading"><div class="spinner"></div>LOADING MARKET DATA</div></div>
    <div class="page" id="page-markets"><div class="loading"><div class="spinner"></div>FETCHING PRICES</div></div>
    <div class="page" id="page-signals"><div class="loading"><div class="spinner"></div>COMPUTING SIGNALS</div></div>
    <div class="page" id="page-watchlist"><div class="loading"><div class="spinner"></div>LOADING WATCHLIST</div></div>
    <div class="page" id="page-intel"><div class="loading"><div class="spinner"></div>LOADING INTEL</div></div>
  </div>
  <nav class="nav">
    <button class="nb active" onclick="gp('dashboard',this)"><span class="ni">📊</span>Dashboard</button>
    <button class="nb" onclick="gp('markets',this)"><span class="ni">💹</span>Markets</button>
    <button class="nb" onclick="gp('signals',this)"><span class="ni">🎯</span>Signals</button>
    <button class="nb" onclick="gp('watchlist',this)"><span class="ni">⭐</span>Watchlist</button>
    <button class="nb" onclick="gp('intel',this)"><span class="ni">🧠</span>Intel</button>
  </nav>
</div>
<div class="panel" id="dpanel">
  <div class="ph">
    <button class="bb" onclick="closeD()">‹</button>
    <div id="dtitle" style="font-family:var(--font);font-size:13px;font-weight:700;flex:1"></div>
    <button class="starbtn" id="dstar" onclick="toggleWL()">☆</button>
  </div>
  <div class="pb" id="dbody"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#050810');tg.setBackgroundColor('#050810')}
let coins=[],gdata=null,trending=[],fg=null;
let wl=JSON.parse(localStorage.getItem('wl')||'["bitcoin","ethereum","solana"]');
let alerts=JSON.parse(localStorage.getItem('alerts')||'{}');
let curPage='dashboard',loaded=new Set(),detailId=null;
const CG='https://api.coingecko.com/api/v3';
const IDS=['bitcoin','ethereum','solana','binancecoin','ripple','cardano','dogecoin','avalanche-2','chainlink','polkadot','toncoin','shiba-inu','litecoin','uniswap','pepe','bitcoin-cash','stellar','near','vechain','filecoin','injective-protocol','aptos','sui','arbitrum','optimism','stacks','render-token','the-graph','aave','maker','compound-governance-token','curve-dao-token','1inch','synthetix-network-token','lido-dao','rocket-pool','ethereum-name-service','decentraland','the-sandbox','axie-infinity','gala','floki','bonk','dogwifcoin','book-of-meme','internet-computer','hedera-hashgraph','algorand','cosmos','cronos','fantom','harmony','theta-token','kadena','neo','monero','zcash','dash','bitcoin-sv','ethereum-classic','tron','eos','iota','fetch-ai','singularitynet','ocean-protocol','helium','arweave','storj','band-protocol','api3','uma','woo-network','dydx','gmx','blur','convex-finance','frax-share','spell-token','pancakeswap-token','sushi','balancer','yearn-finance','immutable-x','stepn','klay-token','zilliqa','waves','elrond-erd-2','qtum','nano','digibyte','ravencoin','bitcoin-gold','nem','numeraire','cortex','tellor','gains-network','perpetual-protocol','looks-rare'];
const META={'bitcoin':{sym:'BTC',icon:'₿',bg:'#f7931a22',fg:'#f7931a'},'ethereum':{sym:'ETH',icon:'Ξ',bg:'#627eea22',fg:'#627eea'},'solana':{sym:'SOL',icon:'◎',bg:'#9945ff22',fg:'#9945ff'},'binancecoin':{sym:'BNB',icon:'B',bg:'#f3ba2f22',fg:'#f3ba2f'},'ripple':{sym:'XRP',icon:'✕',bg:'#00aae422',fg:'#00aae4'},'cardano':{sym:'ADA',icon:'₳',bg:'#6fa8dc22',fg:'#6fa8dc'},'dogecoin':{sym:'DOGE',icon:'Ð',bg:'#c2a63322',fg:'#c2a633'},'avalanche-2':{sym:'AVAX',icon:'A',bg:'#e8413322',fg:'#e84133'},'chainlink':{sym:'LINK',icon:'⬡',bg:'#4a90d922',fg:'#4a90d9'},'polkadot':{sym:'DOT',icon:'●',bg:'#e6007a22',fg:'#e6007a'},'toncoin':{sym:'TON',icon:'💎',bg:'#0088cc22',fg:'#0088cc'},'shiba-inu':{sym:'SHIB',icon:'🐕',bg:'#ff660022',fg:'#ff6600'},'litecoin':{sym:'LTC',icon:'Ł',bg:'#bebebe22',fg:'#bebebe'},'uniswap':{sym:'UNI',icon:'🦄',bg:'#ff007a22',fg:'#ff007a'},'pepe':{sym:'PEPE',icon:'🐸',bg:'#00cc4422',fg:'#00cc44'},'near':{sym:'NEAR',icon:'N',bg:'#00c08b22',fg:'#00c08b'},'aptos':{sym:'APT',icon:'A',bg:'#2dd8a322',fg:'#2dd8a3'},'sui':{sym:'SUI',icon:'S',bg:'#4da2ff22',fg:'#4da2ff'},'arbitrum':{sym:'ARB',icon:'⬡',bg:'#28a0f022',fg:'#28a0f0'},'optimism':{sym:'OP',icon:'●',bg:'#ff042022',fg:'#ff0420'},'injective-protocol':{sym:'INJ',icon:'I',bg:'#00b4d822',fg:'#00b4d8'},'aave':{sym:'AAVE',icon:'A',bg:'#b6509e22',fg:'#b6509e'},'maker':{sym:'MKR',icon:'M',bg:'#1aab9b22',fg:'#1aab9b'},'lido-dao':{sym:'LDO',icon:'L',bg:'#00a3ff22',fg:'#00a3ff'},'decentraland':{sym:'MANA',icon:'🏙',bg:'#ff274b22',fg:'#ff274b'},'the-sandbox':{sym:'SAND',icon:'🏖',bg:'#04adef22',fg:'#04adef'},'axie-infinity':{sym:'AXS',icon:'🐾',bg:'#0055d422',fg:'#0055d4'},'floki':{sym:'FLOKI',icon:'🐶',bg:'#ff8c4222',fg:'#ff8c42'},'bonk':{sym:'BONK',icon:'🔨',bg:'#f5a62322',fg:'#f5a623'},'monero':{sym:'XMR',icon:'ɱ',bg:'#ff690022',fg:'#ff6900'},'cosmos':{sym:'ATOM',icon:'⚛',bg:'#6f4cff22',fg:'#6f4cff'},'internet-computer':{sym:'ICP',icon:'∞',bg:'#7b2dff22',fg:'#7b2dff'},'fetch-ai':{sym:'FET',icon:'F',bg:'#1c6ef322',fg:'#1c6ef3'},'helium':{sym:'HNT',icon:'H',bg:'#474dff22',fg:'#474dff'},'arweave':{sym:'AR',icon:'A',bg:'#aaaacc22',fg:'#aaaacc'},'gmx':{sym:'GMX',icon:'G',bg:'#03d1cf22',fg:'#03d1cf'},'dydx':{sym:'DYDX',icon:'D',bg:'#6966ff22',fg:'#6966ff'},'blur':{sym:'BLUR',icon:'B',bg:'#ff8c4222',fg:'#ff8c42'},'ethereum-classic':{sym:'ETC',icon:'Ξ',bg:'#328c6922',fg:'#328c69'},'tron':{sym:'TRX',icon:'T',bg:'#ef002722',fg:'#ef0027'},'fantom':{sym:'FTM',icon:'F',bg:'#1969ff22',fg:'#1969ff'}};
function gm(id){return META[id]||{sym:(id||'').slice(0,4).toUpperCase(),icon:'●',bg:'#1a2d4a22',fg:'#00d4ff'}}

async function apig(url){try{const r=await fetch(url);if(!r.ok)return null;return await r.json()}catch{return null}}
async function fetchCoins(ids){return await apig(`${CG}/coins/markets?vs_currency=usd&ids=${ids.join(',')}&order=market_cap_desc&per_page=${ids.length}&page=1&sparkline=true&price_change_percentage=1h,24h,7d`)||[]}
async function loadAll(){
  const b1=IDS.slice(0,50),b2=IDS.slice(50,100);
  const [c1,c2,gd,tr,f]=await Promise.all([fetchCoins(b1),fetchCoins(b2),apig(`${CG}/global`),apig(`${CG}/search/trending`),apig('https://api.alternative.me/fng/')]);
  coins=[...(c1||[]),...(c2||[])];
  gdata=gd?.data||null;trending=tr?.coins?.slice(0,10)||[];fg=f?.data?.[0]||null;
  checkAlerts();
}
function checkAlerts(){coins.forEach(c=>{const a=alerts[c.id];if(!a)return;const p=c.current_price||0;if(a.above&&p>=a.above){showToast(`🔔 ${gm(c.id).sym} hit $${a.above}!`,'gold');delete alerts[c.id];saveAlerts()}if(a.below&&p<=a.below){showToast(`🔔 ${gm(c.id).sym} dropped to $${a.below}!`,'red');delete alerts[c.id];saveAlerts()}})}
function saveAlerts(){localStorage.setItem('alerts',JSON.stringify(alerts))}
function saveWL(){localStorage.setItem('wl',JSON.stringify(wl))}
function showToast(msg,t=''){const el=document.getElementById('toast');el.textContent=msg;el.style.borderColor=t==='gold'?'var(--gold)':t==='red'?'var(--red)':'var(--border)';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000)}
function openLink(url){if(tg?.openLink)tg.openLink(url);else window.open(url,'_blank')}
function openBuy(sym){openLink(`https://www.binance.com/en/trade/${sym}_USDT`)}
function openSell(sym){openLink(`https://www.binance.com/en/trade/${sym}_USDT`)}
function openTV(sym){openLink(`https://www.tradingview.com/chart/?symbol=BINANCE:${sym}USDT`)}
function openCG(id){openLink(`https://www.coingecko.com/en/coins/${id}`)}
function openBNB(sym){openLink(`https://www.binance.com/en/price/${sym.toLowerCase()}`)}

function calcRSI(p,n=14){if(!p||p.length<n+1)return null;let g=[],l=[];for(let i=1;i<p.length;i++){const d=p[i]-p[i-1];g.push(Math.max(d,0));l.push(Math.max(-d,0))}const ag=g.slice(-n).reduce((a,b)=>a+b,0)/n,al=l.slice(-n).reduce((a,b)=>a+b,0)/n;return al===0?100:Math.round(100-(100/(1+ag/al)))}
function calcSMA(p,n){if(!p||p.length<n)return null;return p.slice(-n).reduce((a,b)=>a+b,0)/n}
function calcEMA(p,n){if(!p||p.length<n)return null;let k=2/(n+1),e=p.slice(0,n).reduce((a,b)=>a+b,0)/n;for(let i=n;i<p.length;i++)e=p[i]*k+e*(1-k);return e}
function calcMACD(p){if(!p||p.length<26)return{macd:null,sig:null};const e12=calcEMA(p,12),e26=calcEMA(p,26);if(!e12||!e26)return{macd:null,sig:null};const m=e12-e26;return{macd:m,sig:m*0.9}}
function calcBoll(p,n=20){const s=calcSMA(p,n);if(!s)return{u:null,l:null};const sl=p.slice(-n),v=sl.reduce((a,b)=>a+Math.pow(b-s,2),0)/n,std=Math.sqrt(v);return{u:s+2*std,l:s-2*std}}
function getSig(coin){
  const sp=coin.sparkline_in_7d?.price||[];
  const rsi=calcRSI(sp),s7=calcSMA(sp,49),s25=calcSMA(sp,168);
  const {macd,sig:ms}=calcMACD(sp);const boll=calcBoll(sp);
  const ch24=coin.price_change_percentage_24h_in_currency||0;
  const ch7=coin.price_change_percentage_7d_in_currency||0;
  const vol=coin.total_volume||0,mcap=coin.market_cap||1;
  const price=coin.current_price||0,ath=coin.ath||0;
  let sc=0,tags=[];
  if(rsi){if(rsi<20){sc+=5;tags.push('EXTREME OVERSOLD')}else if(rsi<30){sc+=3;tags.push('OVERSOLD')}else if(rsi>80){sc-=5;tags.push('EXTREME OB')}else if(rsi>70){sc-=3;tags.push('OVERBOUGHT')}else if(rsi<45)sc+=1;else if(rsi>55)sc-=1}
  if(s7&&s25){if(s7>s25){sc+=2;tags.push('BULL CROSS')}else{sc-=2;tags.push('BEAR CROSS')}}
  if(macd&&ms){if(macd>ms){sc+=1;tags.push('MACD ↑')}else{sc-=1;tags.push('MACD ↓')}}
  if(boll.l&&price<boll.l){sc+=2;tags.push('BOLL LOW')}else if(boll.u&&price>boll.u){sc-=2;tags.push('BOLL HIGH')}
  if(ch24>10){sc+=3;tags.push('🚀 PUMPING')}else if(ch24>5){sc+=2;tags.push('MOMENTUM')}else if(ch24<-10){sc-=3;tags.push('💥 DUMPING')}else if(ch24<-5)sc-=2;
  if(vol/mcap>0.2){sc+=2;tags.push('HIGH VOL')}else if(vol/mcap>0.1)sc+=1;
  if(ath&&price){const d=((price-ath)/ath)*100;if(d>-10)tags.push('NEAR ATH');else if(d<-70){sc+=1;tags.push('DISCOUNTED')}}
  let label,cls;
  if(sc>=6){label='🚀 STRONG BUY';cls='strong-buy'}else if(sc>=3){label='✅ BUY';cls='buy'}else if(sc<=-6){label='🔻 STRONG SELL';cls='strong-sell'}else if(sc<=-3){label='🔴 SELL';cls='sell'}else{label='⏸ HOLD';cls='hold'}
  return{sc,label,cls,rsi,s7,s25,macd,boll,tags,ch24,ch7}
}

function fp(p){if(!p)return'$0';if(p>=1000)return'$'+p.toLocaleString('en',{maximumFractionDigits:2});if(p>=1)return'$'+p.toFixed(4);if(p>=0.001)return'$'+p.toFixed(6);return'$'+p.toFixed(8)}
function fb(n){if(!n)return'$0';if(n>=1e12)return'$'+(n/1e12).toFixed(2)+'T';if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';return'$'+n.toLocaleString()}
function fc(v,s=false){if(v===null||v===undefined)return'<span style="color:var(--muted)">─</span>';const u=v>=0,cls=u?'up':'down',sign=u?'+':'',icon=u?'▲':'▼';return s?`<span class="${cls}">${icon}${Math.abs(v).toFixed(2)}%</span>`:`<span class="pc ${cls}">${sign}${v.toFixed(2)}%</span>`}
function spark(prices,color){if(!prices||prices.length<2)return'';const w=64,h=26,sl=prices.slice(-20);const mn=Math.min(...sl),mx=Math.max(...sl),rng=mx-mn||1;const pts=sl.map((p,i)=>`${(i/(sl.length-1))*w},${h-((p-mn)/rng)*h}`).join(' ');const area=`${pts} ${w},${h} 0,${h}`;const id='s'+Math.random().toString(36).slice(2,6);return`<svg class="sparkline" viewBox="0 0 ${w} ${h}"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon points="${area}" fill="url(#${id})"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
function cbars(prices){if(!prices||prices.length<2)return'';const sl=prices.slice(-40),mn=Math.min(...sl),mx=Math.max(...sl),rng=mx-mn||1;return sl.map((p,i)=>{const h=((p-mn)/rng)*85+5,color=p>=(sl[i-1]||p)?'#00e676':'#ff3d5a';return`<div class="cb" style="height:${h}%;background:${color};opacity:.7"></div>`}).join('')}
function nowUTC(){return new Date().toLocaleString('en',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'UTC'})+' UTC'}

  <div style="text-align:center;padding:18px 0 14px">
    <div class="pb2">${fp(coin.current_price)}</div>
    <div style="display:flex;justify-content:center;gap:6px;margin-top:8px;flex-wrap:wrap">${fc(ch1)}<span style="color:var(--muted);font-size:11px;align-self:center">1h</span>${fc(ch24)}<span style="color:var(--muted);font-size:11px;align-self:center">24h</span>${fc(ch7)}<span style="color:var(--muted);font-size:11px;align-self:center">7d</span></div>
    <div style="margin-top:12px"><span class="sb ${sig.cls}" style="font-size:12px;padding:8px 18px">${sig.label}</span></div>
    ${tagsHtml?`<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;justify-content:center">${tagsHtml}</div>`:''}
  </div>
  <div class="chart-area">${cbars(sp)}</div>
  <div class="ar">
    <button class="ab ab-buy" onclick="openBuy('${m.sym}')"><span class="abi">🟢</span>BUY ON BINANCE</button>
    <button class="ab ab-sell" onclick="openSell('${m.sym}')"><span class="abi">🔴</span>SELL ON BINANCE</button>
    <button class="ab ab-tv" onclick="openTV('${m.sym}')"><span class="abi">📊</span>TRADINGVIEW CHART</button>
    <button class="ab ab-bnb" onclick="openBNB('${m.sym}')"><span class="abi">💛</span>BINANCE PRICE PAGE</button>
    <button class="ab ab-full" onclick="openCG('${id}')"><span class="abi">🔍</span>FULL INFO ON COINGECKO</button>
  </div>
  <div class="sg" style="margin-bottom:10px">
    <div class="sx"><div class="sl">Market Cap</div><div class="sv">${fb(coin.market_cap||0)}</div></div>
    <div class="sx"><div class="sl">24h Volume</div><div class="sv">${fb(coin.total_volume||0)}</div></div>
    <div class="sx"><div class="sl">24h High</div><div class="sv up">${fp(coin.high_24h||0)}</div></div>
    <div class="sx"><div class="sl">24h Low</div><div class="sv down">${fp(coin.low_24h||0)}</div></div>
    <div class="sx"><div class="sl">All Time High</div><div class="sv">${fp(coin.ath||0)}</div></div>
    <div class="sx"><div class="sl">ATH Change</div><div class="sv ${(coin.ath_change_percentage||0)>=0?'up':'down'}">${(coin.ath_change_percentage||0).toFixed(1)}%</div></div>
    <div class="sx"><div class="sl">Circulating</div><div class="sv" style="font-size:11px">${(coin.circulating_supply||0).toLocaleString('en',{maximumFractionDigits:0})}</div></div>
    <div class="sx"><div class="sl">Rank</div><div class="sv" style="color:var(--gold2)">#${coin.market_cap_rank||'?'}</div></div>
  </div>
  <div class="card" style="margin-bottom:10px">
    <div class="sec">🔬 TECHNICAL ANALYSIS</div>
    <div class="ir"><span class="il">RSI (14)</span><span class="iv" style="color:${rc}">${sig.rsi||'─'} — ${sig.rsi<30?'Oversold':sig.rsi>70?'Overbought':'Neutral'}</span></div>
    ${sig.rsi?`<div class="rt"><div class="rf" style="width:${sig.rsi}%;background:${rc}"></div></div>`:''}
    <div class="ir"><span class="il">Signal Score</span><span class="iv" style="color:${sig.sc>0?'var(--green)':sig.sc<0?'var(--red)':'var(--gold2)'}">${sig.sc>0?'+':''}${sig.sc}</span></div>
    <div class="ir"><span class="il">SMA 7d</span><span class="iv">${sig.s7?fp(sig.s7):'─'}</span></div>
    <div class="ir"><span class="il">SMA 25d</span><span class="iv">${sig.s25?fp(sig.s25):'─'}</span></div>
    <div class="ir"><span class="il">MACD</span><span class="iv" style="color:${sig.macd>0?'var(--green)':'var(--red)'}">${sig.macd?sig.macd.toFixed(6):'─'}</span></div>
    <div class="ir"><span class="il">Bollinger Upper</span><span class="iv">${sig.boll.u?fp(sig.boll.u):'─'}</span></div>
    <div class="ir"><span class="il">Bollinger Lower</span><span class="iv">${sig.boll.l?fp(sig.boll.l):'─'}</span></div>
  </div>
  <div class="card">
    <div class="sec">🔔 SET PRICE ALERT</div>
    <div class="ai">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Current: <b style="color:var(--text)">${fp(coin.current_price)}</b></div>
      <input class="ainput" id="a-above" placeholder="Alert when price goes ABOVE $..." type="number" step="any"/>
      <input class="ainput" id="a-below" placeholder="Alert when price goes BELOW $..." type="number" step="any"/>
      <button class="alertbtn" onclick="setAlert('${id}')">⏰ SET ALERT</button>
    </div>
  </div>
  <div style="font-size:9px;color:var(--muted);text-align:center;padding:8px 0 4px;font-family:var(--font);letter-spacing:1px">⚠ NOT FINANCIAL ADVICE · DYOR<br>${nowUTC()}</div>`;
  document.getElementById('dpanel').classList.add('open');
}

function closeD(){document.getElementById('dpanel').classList.remove('open');detailId=null;if(loaded.has('watchlist'))renderWatchlist()}
function toggleWL(){if(!detailId)return;const i=wl.indexOf(detailId);if(i>=0){wl.splice(i,1);showToast('Removed from watchlist')}else{wl.push(detailId);showToast('⭐ Added to watchlist','gold')}saveWL();document.getElementById('dstar').textContent=wl.includes(detailId)?'⭐':'☆'}
function setAlert(id){const above=parseFloat(document.getElementById('a-above').value)||null,below=parseFloat(document.getElementById('a-below').value)||null;if(!above&&!below){showToast('Enter at least one price','red');return}alerts[id]={above,below};saveAlerts();showToast('🔔 Alert set!','gold');document.getElementById('a-above').value='';document.getElementById('a-below').value=''}

function gp(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');curPage=name;
  if(!loaded.has(name)||name==='watchlist'){loaded.add(name);switch(name){case'dashboard':renderDashboard();break;case'markets':renderMarkets();break;case'signals':renderSignals();break;case'watchlist':renderWatchlist();break;case'intel':renderIntel();break}}
}

setInterval(()=>{const n=new Date(),h=n.getUTCHours().toString().padStart(2,'0'),m=n.getUTCMinutes().toString().padStart(2,'0'),s=n.getUTCSeconds().toString().padStart(2,'0');const el=document.getElementById('clk');if(el)el.textContent=`${h}:${m}:${s} UTC`},1000);

async function init(){
  await loadAll();
  loaded.add('dashboard');
  renderDashboard();
  setInterval(async()=>{await loadAll();loaded.delete(curPage);gp(curPage,document.querySelector('.nb.active'))},60000);
}
init();
</script>
</body>
</html>
